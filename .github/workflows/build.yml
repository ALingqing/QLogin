# ============================================================
# QLogin 多版本批量构建工作流
# 自动构建所有 MC 版本 + 加载器组合
# ============================================================
name: Build All Versions

on:
  push:
    branches: [ "main", "master", "dev" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'MODRINTH.md'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # 手动触发

# 每个版本模块的 Java 版本需求
# ┌──────────────────────┬──────────┬───────┐
# │ 模块                  │ 加载器   │ Java  │
# ├──────────────────────┼──────────┼───────┤
# │ v1_12_2-forge        │ Forge    │ 8     │
# │ v1_19_2-forge        │ Forge    │ 17    │
# │ v1_19_2-fabric       │ Fabric   │ 17    │
# │ v1_20_1-forge        │ Forge    │ 17    │
# │ v1_20_1-fabric       │ Fabric   │ 17    │
# │ v1_20_1-neoforge     │ NeoForge │ 17    │
# │ v1_21-fabric         │ Fabric   │ 21    │
# │ v1_21_1-fabric       │ Fabric   │ 21    │
# │ v1_21_1-neoforge     │ NeoForge │ 21    │
# │ v1_26_2-fabric       │ Fabric   │ 25    │
# └──────────────────────┴──────────┴───────┘

jobs:
  # ---------- Java 17 模块（绝大多数） ----------
  build-java17:
    name: "Build ${{ matrix.module }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # 一个模块失败不影响其他
      matrix:
        module:
          - v1_19_2-forge
          - v1_19_2-fabric
          - v1_20_1-forge
          - v1_20_1-fabric
          - v1_20_1-neoforge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: "Build ${{ matrix.module }}"
        run: ./gradlew ":${{ matrix.module }}:build" --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.module }}"
          path: "${{ matrix.module }}/build/libs/*.jar"
          if-no-files-found: warn

  # ---------- Java 21 模块（1.21 / 1.21.1） ----------
  build-java21:
    name: "Build ${{ matrix.module }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - v1_21-fabric
          - v1_21_1-fabric
          - v1_21_1-neoforge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: "Build ${{ matrix.module }}"
        run: ./gradlew ":${{ matrix.module }}:build" --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "${{ matrix.module }}"
          path: "${{ matrix.module }}/build/libs/*.jar"
          if-no-files-found: warn

  # ---------- Java 8 模块（1.12.2 - RetroFuturaGradle） ----------
  build-java8:
    name: "Build v1_12_2-forge"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build v1_12_2-forge
        run: ./gradlew :v1_12_2-forge:build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "v1_12_2-forge"
          path: "v1_12_2-forge/build/libs/*.jar"
          if-no-files-found: warn

  # ---------- Java 25 模块（26.2 - 前瞻版本） ----------
  build-java25:
    name: "Build v1_26_2-fabric"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build v1_26_2-fabric
        run: ./gradlew :v1_26_2-fabric:build --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "v1_26_2-fabric"
          path: "v1_26_2-fabric/build/libs/*.jar"
          if-no-files-found: warn

  # ---------- Paper 插件（独立 Maven 项目） ----------
  build-paper:
    name: "Build paper-plugin"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build with Maven
        run: |
          cd paper-plugin
          mvn clean package -q

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "paper-plugin"
          path: "paper-plugin/target/*.jar"
          if-no-files-found: warn
