plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
}

base {
    archivesName = "${rootProject.archives_base_name}-1.21"
}

sourceSets {
    main {
        java {
            srcDir "src/main/java"
        }
        resources {
            srcDir "src/main/resources"
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Minecraft 1.21
    minecraft "com.mojang:minecraft:${rootProject.mc_1_21}"
    mappings "net.fabricmc:yarn:${rootProject.yarn_1_21}:v2"
    modImplementation "net.fabricmc:fabric-loader:${rootProject.loader_1_21}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${rootProject.fabric_1_21}"

    include "org.xerial:sqlite-jdbc:${rootProject.sqlite_jdbc_version}"
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

loom {
    mixin.defaultRefmapName = "QLogin-1.21-refmap.json"
}

tasks.withType(Jar).configureEach {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

compileJava {
    dependsOn ':v1_21:processResources'
}
